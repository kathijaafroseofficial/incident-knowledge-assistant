# Render Blueprint: deploy the POST /chat API as a free public web service
# https://render.com/docs/blueprint-spec
# After deploy, add env vars in Dashboard → Environment (API_BEARER_TOKEN, BOT_PROVIDER, OPENAI_COMPATIBLE_*). See DEPLOYMENT.md.

services:
  - type: web
    name: incident-knowledge-api
    runtime: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements-api.txt
    startCommand: uvicorn api_server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
